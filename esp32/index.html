<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Control Grúa Torre</title>
    <style>
        :root {
            --bg-color: #0f172a;
            --surface-color: rgba(30, 41, 59, 0.7);
            --primary-color: #3b82f6;
            --primary-hover: #2563eb;
            --danger-color: #ef4444;
            --danger-hover: #dc2626;
            --text-color: #f8fafc;
            --text-muted: #94a3b8;
        }

        body {
            margin: 0;
            padding: 0;
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            overflow-x: hidden;
            touch-action: none; /* Prevent scrolling while using joystick */
            background-image: 
                radial-gradient(at 0% 0%, rgba(59, 130, 246, 0.15) 0px, transparent 50%),
                radial-gradient(at 100% 100%, rgba(239, 68, 68, 0.1) 0px, transparent 50%);
        }

        h1 {
            margin-top: 2rem;
            font-size: 1.75rem;
            font-weight: 700;
            letter-spacing: -0.025em;
            text-align: center;
            background: linear-gradient(to right, #60a5fa, #a78bfa);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .status {
            font-size: 0.875rem;
            color: var(--text-muted);
            margin-bottom: 2rem;
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        .status-dot {
            width: 8px;
            height: 8px;
            background-color: #10b981;
            border-radius: 50%;
            box-shadow: 0 0 10px #10b981;
        }

        .controls-container {
            display: grid;
            grid-template-columns: 1fr;
            gap: 2rem;
            width: 100%;
            max-width: 400px;
            padding: 0 1.5rem;
            box-sizing: border-box;
        }

        .control-group {
            background: var(--surface-color);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 1.5rem;
            padding: 1.5rem;
            display: flex;
            flex-direction: column;
            align-items: center;
            box-shadow: 0 10px 30px -10px rgba(0, 0, 0, 0.5);
        }

        .control-title {
            font-size: 0.875rem;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            color: var(--text-muted);
            margin-bottom: 1rem;
            font-weight: 600;
        }

        .d-pad {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 0.5rem;
            width: 100%;
            max-width: 200px;
        }

        .btn {
            background-color: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            color: var(--text-color);
            border-radius: 0.75rem;
            padding: 1rem;
            font-size: 1.5rem;
            cursor: pointer;
            transition: all 0.2s ease;
            display: flex;
            justify-content: center;
            align-items: center;
            user-select: none;
            -webkit-user-select: none;
        }

        .btn:active, .btn.active {
            background-color: var(--primary-color);
            transform: scale(0.95);
            box-shadow: 0 0 15px rgba(59, 130, 246, 0.5);
        }

        .btn-up { grid-column: 2; grid-row: 1; }
        .btn-left { grid-column: 1; grid-row: 2; }
        .btn-right { grid-column: 3; grid-row: 2; }
        .btn-down { grid-column: 2; grid-row: 3; }

        .btn-center {
            grid-column: 2;
            grid-row: 2;
            background-color: transparent;
            border: none;
            pointer-events: none;
        }

        .btn-stop {
            background-color: rgba(239, 68, 68, 0.1);
            border-color: rgba(239, 68, 68, 0.3);
            color: var(--danger-color);
            width: 100%;
            margin-top: 1rem;
            font-size: 1rem;
            font-weight: 600;
            padding: 1rem;
            border-radius: 1rem;
            letter-spacing: 0.05em;
        }

        .btn-stop:active {
            background-color: var(--danger-color);
            color: white;
            box-shadow: 0 0 20px rgba(239, 68, 68, 0.6);
        }

        /* Elevación y Giro controls (Linear layout) */
        .linear-controls {
            display: flex;
            gap: 1rem;
            width: 100%;
            justify-content: center;
        }
        
        .linear-controls .btn {
            width: 4rem;
            height: 4rem;
        }

        svg {
            width: 24px;
            height: 24px;
            fill: currentColor;
        }

    </style>
</head>
<body>

    <h1>Grúa Torre</h1>
    <div class="status">
        <div class="status-dot"></div>
        <span>Sistema Online</span>
    </div>

    <div class="controls-container">
        <!-- Control de Carro -->
        <div class="control-group">
            <div class="control-title">Carro</div>
            <div class="linear-controls">
                <button class="btn command-btn" data-cmd="B">
                    <svg viewBox="0 0 24 24"><path d="M15.41 16.59L10.83 12l4.58-4.59L14 6l-6 6 6 6 1.41-1.41z"/></svg>
                </button>
                <button class="btn command-btn" data-cmd="F">
                    <svg viewBox="0 0 24 24"><path d="M8.59 16.59L13.17 12 8.59 7.41 10 6l6 6-6 6-1.41-1.41z"/></svg>
                </button>
            </div>
        </div>

        <!-- Control de Elevación -->
        <div class="control-group">
            <div class="control-title">Elevación</div>
            <div class="linear-controls">
                <button class="btn command-btn" data-cmd="D">
                    <svg viewBox="0 0 24 24"><path d="M7.41 8.59L12 13.17l4.59-4.58L18 10l-6 6-6-6 1.41-1.41z"/></svg>
                </button>
                <button class="btn command-btn" data-cmd="U">
                    <svg viewBox="0 0 24 24"><path d="M7.41 15.41L12 10.83l4.59 4.58L18 14l-6-6-6 6 1.41 1.41z"/></svg>
                </button>
            </div>
        </div>

        <!-- Control de Giro (Stepper) -->
        <div class="control-group">
            <div class="control-title">Giro</div>
            <div class="linear-controls">
                <button class="btn command-btn" data-cmd="L">
                    <svg viewBox="0 0 24 24"><path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm5 11h-4v4h-2v-4H7v-2h4V7h2v4h4v2z" transform="rotate(-90 12 12)"/></svg>
                </button>
                <button class="btn command-btn" data-cmd="R">
                    <svg viewBox="0 0 24 24"><path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm5 11h-4v4h-2v-4H7v-2h4V7h2v4h4v2z" transform="rotate(90 12 12)"/></svg>
                </button>
            </div>
        </div>

        <!-- Parada de Emergencia -->
        <button class="btn btn-stop command-btn" data-cmd="S">PARADA / STOP</button>
    </div>

    <script>
        let currentInterval = null;
        const SEND_INTERVAL_MS = 100; // Enviar comando cada 100ms mientras se mantiene presionado

        const sendCommand = async (cmd) => {
            try {
                await fetch(`/cmd?action=${cmd}`);
            } catch (error) {
                console.error('Error enviando comando:', error);
            }
        };

        const startCommand = (cmd, buttonElement) => {
            if (currentInterval) clearInterval(currentInterval);
            buttonElement.classList.add('active');
            sendCommand(cmd); // Enviar inmediatamente
            currentInterval = setInterval(() => sendCommand(cmd), SEND_INTERVAL_MS);
        };

        const stopCommand = (buttonElement) => {
            if (currentInterval) {
                clearInterval(currentInterval);
                currentInterval = null;
            }
            if (buttonElement) buttonElement.classList.remove('active');
            sendCommand('S'); // Enviar comando de parada
        };

        // Attach event listeners to all buttons
        document.querySelectorAll('.command-btn').forEach(btn => {
            const cmd = btn.getAttribute('data-cmd');

            // Support both mouse and touch events
            btn.addEventListener('mousedown', (e) => { e.preventDefault(); startCommand(cmd, btn); });
            btn.addEventListener('touchstart', (e) => { e.preventDefault(); startCommand(cmd, btn); });

            btn.addEventListener('mouseup', (e) => { e.preventDefault(); stopCommand(btn); });
            btn.addEventListener('mouseleave', (e) => { e.preventDefault(); stopCommand(btn); });
            btn.addEventListener('touchend', (e) => { e.preventDefault(); stopCommand(btn); });
        });

        // Prevent context menu on long press
        window.oncontextmenu = function(event) {
            event.preventDefault();
            event.stopPropagation();
            return false;
        };
    </script>
</body>
</html>
