<!DOCTYPE html>
<html class="light" lang="es">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Control Grúa Torre – Brushed‑Silver Edition</title>
  <!-- Tailwind CDN (with forms & container‑queries plugins) -->
  <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
  <!-- Google Fonts -->
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;700;800&family=Space+Grotesk:wght@400;500;600;700&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet" />
  <style>
    /* ---------- Brushed‑Silver visual theme ---------- */
    body {
      font-family: 'Space Grotesk', sans-serif;
      background-color: #C0C0C0;
      background-image: linear-gradient(135deg, #d1d5db 0%, #a1a1aa 50%, #d1d5db 100%);
      color: #131313;
      overflow-x: hidden;
      min-height: 100vh;
    }
    .code-font { font-family: 'JetBrains Mono', monospace; }
    .metallic-trim {
      border: 2px solid rgba(255,255,255,0.3);
      box-shadow: inset 0 0 10px rgba(255,255,255,0.2);
      border-radius: 0.75rem;
      padding: 1rem;
    }
    .glass-panel {
      background: rgba(255,255,255,0.15);
      backdrop-filter: blur(8px);
      border-radius: 0.5rem;
      border: 1px solid rgba(255,255,255,0.2);
    }
    .btn-primary {
      @apply bg-blue-600 text-white font-medium py-2 px-4 rounded hover:bg-blue-700 focus:outline-none focus:ring-2 focus:ring-blue-400;
    }
    
    /* ---------- Control UI variables (dark‑mode) ---------- */
    :root {
      --bg-color: #0f172a;   /* dark navy */
      --surface-color: rgba(30, 41, 59, 0.7);
      --primary-color: #3b82f6;
      --primary-hover: #2563eb;
      --danger-color: #ef4444;
      --danger-hover: #dc2626;
      --success-color: #10b981;
      --text-color: #f8fafc;
      --text-muted: #94a3b8;
      --disabled-opacity: 0.35;
    }
    .dark-mode {
      background-color: var(--bg-color);
      color: var(--text-color);
    }
    .control-btn {
      @apply btn-primary m-1;
    }
  </style>
</head>
<body class="dark-mode">
  <header class="glass-panel metallic-trim max-w-4xl mx-auto mt-6 p-4 text-center">
    <h1 class="text-3xl font-bold text-primary">Control de Grúa Torre</h1>
    <p class="text-sm text-muted">Interfaz modernizada con estética Brushed‑Silver</p>
  </header>
  <main class="max-w-4xl mx-auto my-8 flex flex-col lg:flex-row gap-6">
    <!-- Control panel -->
    <section class="flex-1 glass-panel p-4 rounded-lg">
      <h2 class="text-xl font-semibold mb-4 text-primary">Panel de Control</h2>
      <div class="grid grid-cols-2 gap-2">
        <button id="btn-up" class="control-btn">↑ Subir</button>
        <button id="btn-down" class="control-btn">↓ Bajar</button>
        <button id="btn-left" class="control-btn">← Izquierda</button>
        <button id="btn-right" class="control-btn">→ Derecha</button>
        <button id="btn-rotate-cw" class="control-btn col-span-2">↻ Rotar CW</button>
        <button id="btn-rotate-ccw" class="control-btn col-span-2">↺ Rotar CCW</button>
        <button id="btn-load" class="control-btn col-span-2 bg-green-600 hover:bg-green-700">Cargar</button>
        <button id="btn-unload" class="control-btn col-span-2 bg-red-600 hover:bg-red-700">Descargar</button>
      </div>
    </section>
    <!-- Visualisation -->
    <section class="flex-1 glass-panel p-4 rounded-lg">
      <h2 class="text-xl font-semibold mb-4 text-primary">Vista 3D</h2>
      <svg id="crane-svg" viewBox="0 0 800 600" class="w-full h-96 bg-surface rounded"></svg>
    </section>
  </main>

  <!-- ------- JavaScript Logic (merged from original control UI) ------- -->
  <script>
    // Simple crane state (placeholder – replace with real logic as needed)
    const state = { x: 400, y: 300, angle: 0, load: false };
    const svg = document.getElementById('crane-svg');
    function draw() {
      // Clear previous drawing
      while (svg.firstChild) svg.removeChild(svg.firstChild);
      // Base line (tower)
      const tower = document.createElementNS('http://www.w3.org/2000/svg', 'line');
      tower.setAttribute('x1', '400');
      tower.setAttribute('y1', '600');
      tower.setAttribute('x2', '400');
      tower.setAttribute('y2', '100');
      tower.setAttribute('stroke', 'var(--text-muted)');
      tower.setAttribute('stroke-width', '8');
      svg.appendChild(tower);
      // Arm
      const arm = document.createElementNS('http://www.w3.org/2000/svg', 'line');
      const rad = (Math.PI / 180) * state.angle;
      const endX = state.x + 150 * Math.cos(rad);
      const endY = state.y - 150 * Math.sin(rad);
      arm.setAttribute('x1', state.x);
      arm.setAttribute('y1', state.y);
      arm.setAttribute('x2', endX);
      arm.setAttribute('y2', endY);
      arm.setAttribute('stroke', state.load ? 'var(--danger-color)' : 'var(--primary-color)');
      arm.setAttribute('stroke-width', '6');
      svg.appendChild(arm);
      // Hook (circle)
      const hook = document.createElementNS('http://www.w3.org/2000/svg', 'circle');
      hook.setAttribute('cx', endX);
      hook.setAttribute('cy', endY);
      hook.setAttribute('r', '10');
      hook.setAttribute('fill', state.load ? 'var(--danger-color)' : 'var(--success-color)');
      svg.appendChild(hook);
    }
    // Movement helpers
    function move(dx, dy) { state.x += dx; state.y += dy; draw(); }
    function rotate(delta) { state.angle = (state.angle + delta) % 360; draw(); }
    // Button bindings
    document.getElementById('btn-up').onclick = () => move(0, -10);
    document.getElementById('btn-down').onclick = () => move(0, 10);
    document.getElementById('btn-left').onclick = () => move(-10, 0);
    document.getElementById('btn-right').onclick = () => move(10, 0);
    document.getElementById('btn-rotate-cw').onclick = () => rotate(10);
    document.getElementById('btn-rotate-ccw').onclick = () => rotate(-10);
    document.getElementById('btn-load').onclick = () => { state.load = true; draw(); };
    document.getElementById('btn-unload').onclick = () => { state.load = false; draw(); };
    // Initial render
    draw();
  </script>
</body>
</html>
